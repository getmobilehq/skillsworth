name: Weekly raffle provisioning

# Ensures this week's Skill Worth raffle exists in raffu (idempotent).
# See scripts/ensure-weekly-raffle.mjs and CLAUDE.md (raffu coupling).
#
# Secrets (Settings → Secrets and variables → Actions → repository secrets):
#   RAFFU_SUPABASE_URL       raffu's project URL
#   RAFFU_SERVICE_ROLE_KEY   raffu's service-role key (ops only — never client)
#   RAFFU_OWNER_ID           the TTS admin's user id (auth.users) in raffu

on:
  schedule:
    # Monday 07:00 UTC. Cron is always UTC; adjust if BST/DST matters.
    - cron: "0 7 * * 1"
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Ensure this week's raffle
        env:
          RAFFU_SUPABASE_URL: ${{ secrets.RAFFU_SUPABASE_URL }}
          RAFFU_SERVICE_ROLE_KEY: ${{ secrets.RAFFU_SERVICE_ROLE_KEY }}
          RAFFU_OWNER_ID: ${{ secrets.RAFFU_OWNER_ID }}
        run: node scripts/ensure-weekly-raffle.mjs
